apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: mcp-auth-401
  namespace: gateway-system
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: mcp-gateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          portNumber: 8080
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inline_code: |
              function envoy_on_request(request_handle)
                local path = request_handle:headers():get(":path")
                local auth = request_handle:headers():get("authorization")
                -- Allow .well-known endpoints without auth
                if path and path:find("^/.well%-known") then
                  return
                end
                -- Allow OPTIONS (CORS preflight)
                local method = request_handle:headers():get(":method")
                if method == "OPTIONS" then
                  return
                end
                -- Require Bearer token for /mcp
                if path and path:find("^/mcp") and (not auth or not auth:find("^Bearer ")) then
                  request_handle:respond(
                    {
                      [":status"] = "401",
                      ["WWW-Authenticate"] = 'Bearer resource_metadata="http://mcp.127-0-0-1.sslip.io:8001/.well-known/oauth-protected-resource"',
                      ["content-type"] = "application/json",
                      ["access-control-allow-origin"] = "*",
                      ["access-control-allow-headers"] = "Content-Type, Authorization",
                      ["access-control-allow-methods"] = "GET, POST, OPTIONS"
                    },
                    '{"error":"Unauthorized","message":"Authentication required."}'
                  )
                end
              end
