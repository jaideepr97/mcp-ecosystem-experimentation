apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-oidc
  namespace: mcp-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mini-oidc
  template:
    metadata:
      labels:
        app: mini-oidc
    spec:
      containers:
        - name: mini-oidc
          image: quay.io/jrao/mini-oidc:latest
          env:
            - name: ISSUER
              value: http://mini-oidc.mcp-test.svc.cluster.local:9090
            - name: EXTERNAL_URL
              value: http://localhost:8003
          ports:
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: mini-oidc
  namespace: mcp-test
spec:
  selector:
    app: mini-oidc
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: mini-oidc-external
  namespace: mcp-test
spec:
  selector:
    app: mini-oidc
  type: NodePort
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30471
