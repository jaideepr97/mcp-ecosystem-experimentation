# Namespace must exist first: oc new-project keycloak
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: rhbk
  namespace: keycloak
spec:
  targetNamespaces:
    - keycloak
  upgradeStrategy: Default
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhbk-operator
  namespace: keycloak
spec:
  channel: stable-v26.4
  name: rhbk-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
