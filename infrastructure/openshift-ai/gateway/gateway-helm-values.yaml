# MCP Gateway Helm values for team-a
#
# Install:
#   helm install team-a-gateway oci://ghcr.io/kuadrant/mcp-gateway/charts/mcp-gateway \
#     --version 0.6.0 -n team-a -f gateway-helm-values.yaml
#
#   helm install team-a-gateway-ingress oci://ghcr.io/kuadrant/mcp-gateway/charts/mcp-gateway-ingress \
#     --version 0.1.0 -n team-a -f gateway-ingress-helm-values.yaml
#
# This creates: Gateway, MCPGatewayExtension, broker Deployment + Service,
# Envoy data plane (via openshift-default GatewayClass)
controller:
  enabled: false
gateway:
  create: true
  gatewayClassName: openshift-default
  internalHostPattern: "*.mcp.local"
  name: team-a-gateway
  namespace: team-a
  publicHost: team-a-mcp.apps.rosa.agentic-mcp.jolf.p3.openshiftapps.com
mcpGatewayExtension:
  create: true
  gatewayRef:
    name: team-a-gateway
    namespace: team-a
    sectionName: mcp
