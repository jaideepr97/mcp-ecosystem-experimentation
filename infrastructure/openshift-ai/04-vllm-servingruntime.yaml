apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-cuda129-20b-runtime
  namespace: gpt-oss
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    openshift.io/display-name: vLLM with Tool Calling
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  containers:
  - name: kserve-container
    image: registry.redhat.io/rhaii-early-access/vllm-cuda-rhel9@sha256:abf0fd7398a18c47a754218b0cbd76ea300b0c6da5fb8d801db8c165df5022ca
    command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
    args:
    - --model
    - /mnt/models
    - --port
    - "8080"
    - --max-model-len
    - "8192"
    - --gpu-memory-utilization
    - "0.95"
    - --dtype
    - bfloat16
    - --served-model-name
    - vllm-20b
    - --enable-auto-tool-choice
    - --tool-call-parser
    - openai
    env:
    - name: HF_HOME
      value: /tmp/hf_home
    - name: TRANSFORMERS_CACHE
      value: /tmp/transformers_cache
    ports:
    - containerPort: 8080
      name: http
      protocol: TCP
    resources:
      limits:
        cpu: "16"
        memory: 64Gi
        nvidia.com/gpu: "1"
      requests:
        cpu: "8"
        memory: 32Gi
        nvidia.com/gpu: "1"
    volumeMounts:
    - mountPath: /dev/shm
      name: shm
    - mountPath: /mnt/models
      name: models-pvc
  multiModel: false
  runtimeClassName: nvidia
  supportedModelFormats:
  - autoSelect: true
    name: vLLM
    version: "1"
  volumes:
  - emptyDir:
      medium: Memory
      sizeLimit: 16Gi
    name: shm
  - name: models-pvc
    persistentVolumeClaim:
      claimName: gpt-oss-20b-models
