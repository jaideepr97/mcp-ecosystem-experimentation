# Custom catalog sources for the model-registry MCP catalog
# Adds test-mcp-server and test-mcp-server2 to the catalog's discovery index.
# The model-catalog deployment must be configured to mount this ConfigMap.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-catalog-sources
  namespace: odh-model-registries
data:
  sources.yaml: |
    mcp_catalogs:
      - name: Custom MCP Servers
        id: custom_mcp_servers
        type: yaml
        enabled: true
        properties:
          yamlCatalogPath: /data/user-mcp-sources/custom-mcp-servers.yaml
        labels:
          - Custom
    labels:
      - name: Custom
        assetType: mcp_servers
        displayName: Custom MCP servers
        description: Team-curated MCP servers for demo and testing.
  custom-mcp-servers.yaml: |
    source: Custom MCP
    mcp_servers:
      - name: test-mcp-server
        provider: Kuadrant
        license: apache-2.0
        license_link: https://www.apache.org/licenses/LICENSE-2.0
        description: A test MCP server with tools for greeting, time, headers, slow operations, and dynamic tool creation.
        version: latest
        transports:
          - http
        repositoryUrl: https://github.com/Kuadrant/mcp-gateway
        tools:
          - name: greet
            description: Greet someone by name
            parameters:
              - name: name
                type: string
                description: Name to greet
                required: true
          - name: time
            description: Get the current time
            parameters: []
          - name: headers
            description: Get HTTP headers
            parameters: []
          - name: slow
            description: Delay for N seconds
            parameters:
              - name: seconds
                type: integer
                description: Number of seconds to delay
                required: true
          - name: add_tool
            description: Dynamically add a new tool
            parameters:
              - name: name
                type: string
                description: Tool name
                required: true
              - name: description
                type: string
                description: Tool description
                required: true
        artifacts:
          - uri: oci://ghcr.io/kuadrant/mcp-gateway/test-server1:latest
        runtimeMetadata:
          defaultPort: 9090
          mcpPath: /mcp
          defaultArgs:
            - /mcp-test-server
            - --http
            - 0.0.0.0:9090
      - name: test-mcp-server2
        provider: Kuadrant
        license: apache-2.0
        license_link: https://www.apache.org/licenses/LICENSE-2.0
        description: A test MCP server with miscellaneous tools including greeting, time, authorization checking, and chocolate molding.
        version: latest
        transports:
          - http
        repositoryUrl: https://github.com/Kuadrant/mcp-gateway
        tools:
          - name: hello_world
            description: Say hello to someone
            parameters:
              - name: name
                type: string
                description: Name to greet
                required: true
          - name: time
            description: Get the current time
            parameters: []
          - name: headers
            description: Get HTTP headers
            parameters: []
          - name: auth1234
            description: Check authorization header
            parameters: []
          - name: slow
            description: Delay for N seconds
            parameters:
              - name: seconds
                type: integer
                description: Number of seconds to delay
                required: true
          - name: set_time
            description: Set the clock
            parameters:
              - name: time
                type: string
                description: Time to set
                required: true
          - name: pour_chocolate_into_mold
            description: Pour chocolate into mold
            parameters:
              - name: quantity
                type: string
                description: Quantity in milliliters
                required: true
        artifacts:
          - uri: oci://ghcr.io/kuadrant/mcp-gateway/test-server2:latest
        runtimeMetadata:
          defaultPort: 9090
          mcpPath: /mcp
          defaultArgs:
            - /mcp-test-server
            - --http
            - 0.0.0.0:9090
