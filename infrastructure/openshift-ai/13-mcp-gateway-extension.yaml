apiVersion: mcp.kagenti.com/v1alpha1
kind: MCPGatewayExtension
metadata:
  name: mcp-gateway
  namespace: test-jd
spec:
  backendPingIntervalSeconds: 60
  httpRouteManagement: Enabled
  # Default is <gateway>-istio.<ns>.svc — override for non-istio gateway classes
  privateHost: mcp-gateway-data-science-gateway-class.test-jd.svc.cluster.local:8080
  publicHost: mcp-test-jd.apps.rosa.agentic-mcp.jolf.p3.openshiftapps.com
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mcp-gateway
    namespace: test-jd
    sectionName: mcp
