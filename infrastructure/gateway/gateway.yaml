---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  labels:
    istio: ingressgateway
    gateway.io/name: mcp-gateway
  name: mcp-gateway
  namespace: gateway-system
spec:
  gatewayClassName: istio
  listeners:
    # HTTP listeners (existing)
    - name: mcp
      hostname: 'mcp.127-0-0-1.sslip.io'
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: mcps
      port: 8080
      protocol: HTTP
      hostname: '*.mcp.local'
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS listeners (Phase 14: TLS)
    - name: mcp-https
      hostname: 'mcp.127-0-0-1.sslip.io'
      port: 8443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: mcp-gateway-mcp-https-tls
      allowedRoutes:
        namespaces:
          from: All
