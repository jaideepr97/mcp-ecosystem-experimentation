apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-launcher
  namespace: catalog-system
  labels:
    app: mcp-launcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-launcher
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
      labels:
        app: mcp-launcher
    spec:
      serviceAccountName: mcp-launcher
      containers:
        - name: launcher
          image: quay.io/jrao/mcp-launcher:catalog-api
          env:
            - name: CATALOG_API_URL
              value: http://mcp-catalog.catalog-system.svc.cluster.local:8080
            - name: TARGET_NAMESPACE
              value: team-a
            - name: MCP_GATEWAY_ENABLED
              value: "true"
            - name: MCP_GATEWAY_NAME
              value: team-a-gateway
            - name: MCP_GATEWAY_NAMESPACE
              value: team-a
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-launcher
  namespace: catalog-system
spec:
  selector:
    app: mcp-launcher
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-launcher-external
  namespace: catalog-system
spec:
  selector:
    app: mcp-launcher
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30472
