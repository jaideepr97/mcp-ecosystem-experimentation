apiVersion: v1
kind: Namespace
metadata:
  name: mcp-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-controller
  namespace: mcp-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-controller
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - secrets
  - serviceaccounts
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - update
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gateways
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gateways/status
  verbs:
  - get
  - update
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - httproutes
  verbs:
  - create
  - delete
  - get
  - list
  - update
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - httproutes/status
  verbs:
  - update
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - referencegrants
  verbs:
  - list
  - watch
- apiGroups:
  - mcp.kuadrant.io
  resources:
  - mcpgatewayextensions
  - mcpserverregistrations
  - mcpvirtualservers
  verbs:
  - get
  - list
  - update
  - watch
- apiGroups:
  - mcp.kuadrant.io
  resources:
  - mcpgatewayextensions/finalizers
  - mcpvirtualservers/finalizers
  verbs:
  - update
- apiGroups:
  - mcp.kuadrant.io
  resources:
  - mcpgatewayextensions/status
  - mcpserverregistrations/status
  - mcpvirtualservers/status
  verbs:
  - get
  - update
- apiGroups:
  - networking.istio.io
  resources:
  - envoyfilters
  verbs:
  - create
  - delete
  - get
  - list
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-controller
subjects:
- kind: ServiceAccount
  name: mcp-controller
  namespace: mcp-system
---
apiVersion: v1
kind: Secret
metadata:
  name: trusted-headers-public-key
  namespace: mcp-system
stringData:
  key: |
    -----BEGIN PUBLIC KEY-----
    MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE7WdMdvC8hviEAL4wcebqaYbLEtVO
    VEiyi/nozagw7BaWXmzbOWyy95gZLirTkhUb1P4Z4lgKLU2rD5NCbGPHAA==
    -----END PUBLIC KEY-----
type: Opaque
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mcp-controller
    component: controller
  name: mcp-controller
  namespace: mcp-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-controller
      component: controller
  template:
    metadata:
      labels:
        app: mcp-controller
        component: controller
    spec:
      containers:
      - command:
        - ./mcp_controller
        - --log-level=0
        env:
        - name: RELATED_IMAGE_ROUTER_BROKER
          value: ghcr.io/kuadrant/mcp-gateway:latest
        image: ghcr.io/kuadrant/mcp-controller:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 30
        name: mcp-controller
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        - containerPort: 8082
          name: metrics
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
      serviceAccountName: mcp-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-route
  namespace: mcp-system
spec:
  hostnames:
  - mcp.127-0-0-1.sslip.io
  parentRefs:
  - name: mcp-gateway
    namespace: gateway-system
  rules:
  - backendRefs:
    - name: mcp-gateway
      port: 8080
    filters:
    - responseHeaderModifier:
        add:
        - name: Access-Control-Allow-Origin
          value: '*'
        - name: Access-Control-Allow-Methods
          value: GET, POST, PUT, DELETE, OPTIONS, HEAD
        - name: Access-Control-Allow-Headers
          value: Content-Type, Authorization, Accept, Origin, X-Requested-With
        - name: Access-Control-Max-Age
          value: "3600"
        - name: Access-Control-Allow-Credentials
          value: "true"
      type: ResponseHeaderModifier
    matches:
    - path:
        type: PathPrefix
        value: /mcp
  - backendRefs:
    - name: mcp-gateway
      port: 8080
    matches:
    - path:
        type: PathPrefix
        value: /.well-known/oauth-protected-resource
---
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPGatewayExtension
metadata:
  name: mcp-gateway-extension
  namespace: mcp-system
spec:
  publicHost: mcp.127-0-0-1.sslip.io
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mcp-gateway
    namespace: gateway-system
    sectionName: mcp
