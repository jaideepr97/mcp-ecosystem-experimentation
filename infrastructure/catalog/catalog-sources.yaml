apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-catalog-sources
  namespace: catalog-system
data:
  mcp-servers.yaml: |
    source: Experiment
    mcp_servers:
      - name: test-server1
        provider: MCP Gateway Project
        license: apache-2.0
        description: >-
          Go-based test MCP server deployed via the MCP Lifecycle Operator.
          Provides basic tools for testing gateway federation: hi, time, headers.
        version: "latest"
        transports:
          - http
        deploymentMode: local
        artifacts:
          - uri: oci://ghcr.io/kuadrant/mcp-gateway/test-server1:latest
        tools:
          - name: greet
            description: Returns a greeting message
            accessType: read_only
            parameters:
              - name: name
                type: string
                description: Name to greet
                required: true
          - name: time
            description: Returns the current server time
            accessType: read_only
            parameters: []
          - name: headers
            description: Returns the HTTP headers received by the server
            accessType: read_only
            parameters: []
        runtimeMetadata:
          defaultPort: 9090
          mcpPath: /mcp
        securityIndicators:
          verifiedSource: true
          readOnlyTools: true
        createTimeSinceEpoch: "1743400000000"
        lastUpdateTimeSinceEpoch: "1743400000000"
      - name: github-mcp-server
        provider: GitHub
        license: mit
        description: >-
          Official GitHub MCP server for repository, issue, and pull request
          management. Deployed locally from the official container image.
          Requires a GitHub PAT for authentication (injected per-request via Vault).
        version: "latest"
        transports:
          - http
        deploymentMode: local
        artifacts:
          - uri: oci://ghcr.io/github/github-mcp-server:latest
        tools:
          - name: get_me
            description: Get the authenticated GitHub user's profile
            accessType: read_only
            parameters: []
          - name: search_repositories
            description: Search for GitHub repositories
            accessType: read_only
            parameters:
              - name: query
                type: string
                description: Search query
                required: true
          - name: list_issues
            description: List issues for a repository
            accessType: read_only
            parameters:
              - name: owner
                type: string
                required: true
              - name: repo
                type: string
                required: true
          - name: list_pull_requests
            description: List pull requests for a repository
            accessType: read_only
            parameters:
              - name: owner
                type: string
                required: true
              - name: repo
                type: string
                required: true
        runtimeMetadata:
          defaultPort: 8082
          mcpPath: /mcp
        securityIndicators:
          verifiedSource: true
          secureEndpoint: false
        createTimeSinceEpoch: "1736467200000"
        lastUpdateTimeSinceEpoch: "1736467200000"
  sources.yaml: |
    mcp_catalogs:
      - name: "Experiment MCP Servers"
        id: experiment_mcp
        type: yaml
        enabled: true
        properties:
          yamlCatalogPath: mcp-servers.yaml
