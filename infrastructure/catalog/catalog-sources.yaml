apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-catalog-sources
  namespace: catalog-system
data:
  mcp-servers.yaml: |
    source: Experiment
    mcp_servers:
      - name: test-server1
        provider: MCP Gateway Project
        license: apache-2.0
        description: >-
          Go-based test MCP server deployed via the MCP Lifecycle Operator.
          Provides basic tools for testing gateway federation: hi, time, headers.
        version: "latest"
        transports:
          - http
        deploymentMode: local
        artifacts:
          - uri: oci://ghcr.io/kuadrant/mcp-gateway/test-server1:latest
        tools:
          - name: hi
            description: Returns a greeting message
            accessType: read_only
            parameters: []
          - name: time
            description: Returns the current server time
            accessType: read_only
            parameters: []
          - name: headers
            description: Returns the HTTP headers received by the server
            accessType: read_only
            parameters: []
        runtimeMetadata:
          defaultPort: 9090
          mcpPath: /mcp
        securityIndicators:
          verifiedSource: true
          readOnlyTools: true
        createTimeSinceEpoch: "1743400000000"
        lastUpdateTimeSinceEpoch: "1743400000000"
      - name: test-server2
        provider: MCP Gateway Project
        license: apache-2.0
        description: >-
          Second Go-based test MCP server. Provides additional tools for testing
          multi-server gateway federation: hello_world, time, headers, auth1234, set_time.
        version: "latest"
        transports:
          - http
        deploymentMode: local
        artifacts:
          - uri: oci://ghcr.io/kuadrant/mcp-gateway/test-server2:latest
        tools:
          - name: hello_world
            description: Returns a hello world greeting
            accessType: read_only
            parameters: []
          - name: time
            description: Returns the current server time
            accessType: read_only
            parameters: []
          - name: headers
            description: Returns the HTTP headers received by the server
            accessType: read_only
            parameters: []
          - name: auth1234
            description: Returns authentication info
            accessType: read_only
            parameters: []
          - name: set_time
            description: Sets the server time
            accessType: read_write
            parameters:
              - name: time
                type: string
                description: Time to set
                required: true
        runtimeMetadata:
          defaultPort: 9090
          mcpPath: /mcp
        securityIndicators:
          verifiedSource: true
          readOnlyTools: false
        createTimeSinceEpoch: "1743400000000"
        lastUpdateTimeSinceEpoch: "1743400000000"
      - name: github-mcp-server
        provider: GitHub
        license: mit
        description: >-
          Official GitHub MCP server for repository, issue, and pull request
          management. Hosted remotely by GitHub — no local deployment required.
        version: "latest"
        transports:
          - http
        deploymentMode: remote
        endpoints:
          http: https://api.githubcopilot.com/mcp/
        tools:
          - name: search_code
            description: Search for code across GitHub repositories
            accessType: read_only
            parameters:
              - name: query
                type: string
                description: GitHub code search query
                required: true
          - name: list_issues
            description: List issues for a repository
            accessType: read_only
            parameters:
              - name: owner
                type: string
                required: true
              - name: repo
                type: string
                required: true
          - name: list_pull_requests
            description: List pull requests for a repository
            accessType: read_only
            parameters:
              - name: owner
                type: string
                required: true
              - name: repo
                type: string
                required: true
        securityIndicators:
          verifiedSource: true
          secureEndpoint: true
        createTimeSinceEpoch: "1736467200000"
        lastUpdateTimeSinceEpoch: "1736467200000"
  sources.yaml: |
    mcp_catalogs:
      - name: "Experiment MCP Servers"
        id: experiment_mcp
        type: yaml
        enabled: true
        properties:
          yamlCatalogPath: mcp-servers.yaml
