apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: team-a-gateway-auth
  namespace: team-a
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: team-a-gateway
  defaults:
    rules:
      authentication:
        keycloak:
          jwt:
            issuerUrl: http://keycloak.127-0-0-1.sslip.io:8002/realms/mcp
      response:
        success:
          headers:
            x-mcp-virtualserver:
              plain:
                expression: |
                  auth.identity.groups.exists(g, g == 'team-a-leads') ? 'team-a/team-a-lead-tools'
                  : auth.identity.groups.exists(g, g == 'team-a-ops') ? 'team-a/team-a-ops-tools'
                  : auth.identity.groups.exists(g, g == 'team-a-developers') ? 'team-a/team-a-dev-tools'
                  : ''
        unauthenticated:
          body:
            value: |
              {"error":"Unauthorized","message":"Authentication required."}
