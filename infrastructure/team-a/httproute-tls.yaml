apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-gateway-route-tls
  namespace: team-a
spec:
  hostnames:
    - team-a.mcp.127-0-0-1.sslip.io
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: team-a-gateway
      namespace: team-a
      sectionName: mcp-https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: mcp-gateway
          port: 8080
