apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-route
  namespace: keycloak
spec:
  parentRefs:
    - name: mcp-gateway
      namespace: gateway-system
      sectionName: keycloak
  hostnames:
    - 'keycloak.127-0-0-1.sslip.io'
  rules:
    # OAuth discovery endpoint rewrite (Keycloak quirk)
    # MCP/OAuth spec expects: /.well-known/oauth-authorization-server/realms/mcp
    # Keycloak serves:        /realms/mcp/.well-known/oauth-authorization-server
    - matches:
        - path:
            type: Exact
            value: /.well-known/oauth-authorization-server/realms/mcp
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /realms/mcp/.well-known/oauth-authorization-server
      backendRefs:
        - name: keycloak
          port: 80
    # Default rule for all other paths
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: keycloak
          port: 80
