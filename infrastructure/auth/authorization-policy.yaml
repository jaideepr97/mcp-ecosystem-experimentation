apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: mcp-require-jwt
  namespace: gateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: mcp-gateway
  rules:
    - from:
        - source:
            requestPrincipals: ["*"]
