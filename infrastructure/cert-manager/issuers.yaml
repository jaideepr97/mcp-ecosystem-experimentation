# Self-signed issuer → CA certificate → CA issuer chain
# The CA issuer is used by TLSPolicy to provision gateway certificates.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mcp-ca-cert
  namespace: cert-manager
spec:
  isCA: true
  commonName: mcp-ecosystem-ca
  secretName: mcp-ca-secret
  duration: 87600h # 10 years
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: mcp-ca-issuer
spec:
  ca:
    secretName: mcp-ca-secret
