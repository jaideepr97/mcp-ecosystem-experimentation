apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: test-server-a1
  namespace: team-a
  annotations:
    mcp.x-k8s.io/gateway-ref: team-a/team-a-gateway
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: ghcr.io/kuadrant/mcp-gateway/test-server1:latest
  config:
    port: 9090
    path: /mcp
    arguments:
      - /mcp-test-server
      - --http
      - 0.0.0.0:9090
  runtime:
    security:
      securityContext:
        runAsNonRoot: false
