apiVersion: v1
kind: ConfigMap
metadata:
  name: realm-import
  namespace: keycloak
data:
  realm-import.json: |
    {
      "id": "mcp",
      "realm": "mcp",
      "enabled": true,
      "accessTokenLifespan": 1800,
      "clients": [
        {
          "clientId": "mcp-gateway",
          "publicClient": false,
          "secret": "secret",
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": true,
          "attributes": {
            "standard.token.exchange.enabled": "true"
          },
          "defaultClientScopes": [
            "basic",
            "roles",
            "groups",
            "mcp-gateway-audience"
          ],
          "optionalClientScopes": []
        },
        {
          "clientId": "mcp-inspector",
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": [
            "http://localhost:6274/*"
          ],
          "webOrigins": [
            "http://localhost:6274"
          ],
          "attributes": {
            "pkce.code.challenge.method": "S256"
          },
          "defaultClientScopes": [
            "basic",
            "roles",
            "mcp-gateway-audience"
          ],
          "optionalClientScopes": [
            "groups"
          ]
        },
        {
          "clientId": "mcp-cli",
          "publicClient": true,
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": false,
          "attributes": {
            "oauth2.device.authorization.grant.enabled": "true"
          },
          "defaultClientScopes": [
            "basic",
            "roles",
            "mcp-gateway-audience"
          ],
          "optionalClientScopes": [
            "groups"
          ]
        }
      ],
      "groups": [
        {
          "name": "developers"
        },
        {
          "name": "ops"
        }
      ],
      "users": [
        {
          "username": "alice",
          "email": "alice@example.com",
          "firstName": "Alice",
          "lastName": "Developer",
          "enabled": true,
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "alice",
              "temporary": false
            }
          ],
          "groups": [
            "developers"
          ]
        },
        {
          "username": "bob",
          "email": "bob@example.com",
          "firstName": "Bob",
          "lastName": "Operator",
          "enabled": true,
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "bob",
              "temporary": false
            }
          ],
          "groups": [
            "ops"
          ]
        },
        {
          "username": "carol",
          "email": "carol@example.com",
          "firstName": "Carol",
          "lastName": "Admin",
          "enabled": true,
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "carol",
              "temporary": false
            }
          ],
          "groups": [
            "developers",
            "ops"
          ]
        }
      ],
      "clientScopes": [
        {
          "name": "basic",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "false",
            "display.on.consent.screen": "false"
          },
          "protocolMappers": [
            {
              "name": "sub",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-sub-mapper",
              "consentRequired": false,
              "config": {
                "introspection.token.claim": "true",
                "access.token.claim": "true"
              }
            }
          ]
        },
        {
          "name": "groups",
          "protocol": "openid-connect",
          "attributes": {
            "display.on.consent.screen": "false",
            "include.in.token.scope": "true"
          },
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "config": {
                "claim.name": "groups",
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            }
          ]
        },
        {
          "name": "mcp-gateway-audience",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "false",
            "display.on.consent.screen": "false"
          },
          "protocolMappers": [
            {
              "name": "mcp-gateway-audience",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "consentRequired": false,
              "config": {
                "included.custom.audience": "mcp-gateway",
                "id.token.claim": "false",
                "access.token.claim": "true"
              }
            }
          ]
        },
        {
          "name": "roles",
          "description": "OpenID Connect scope for add user roles to the access token",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "false",
            "display.on.consent.screen": "true"
          },
          "protocolMappers": [
            {
              "name": "realm roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "consentRequired": false,
              "config": {
                "introspection.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "realm_access.roles",
                "jsonType.label": "String",
                "multivalued": "true"
              }
            },
            {
              "name": "client roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-client-role-mapper",
              "consentRequired": false,
              "config": {
                "introspection.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "resource_access.${client_id}.roles",
                "jsonType.label": "String",
                "multivalued": "true"
              }
            },
            {
              "name": "audience resolve",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-resolve-mapper",
              "consentRequired": false,
              "config": {
                "introspection.token.claim": "true",
                "access.token.claim": "true"
              }
            }
          ]
        }
      ],
      "defaultDefaultClientScopes": [
        "basic",
        "roles",
        "mcp-gateway-audience"
      ],
      "defaultOptionalClientScopes": [
        "groups"
      ]
    }
